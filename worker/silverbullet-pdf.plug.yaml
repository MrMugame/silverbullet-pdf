name: silverbullet-pdf
assets:
  - "assets/**"
functions:
  pdfViewer:
    path: "./main.ts:viewer"
    editor: [ "pdf" ]
  pdfSearch:
    path: ./main.ts:extract
    events:
      - silversearch:index
  getVersion:
    path: "./main.ts:showVersion"
    command:
      name: "Silverbullet PDF: Version"
  zoomIn:
    path: "./main.ts:zoomIn"
    command:
      name: "PDF: Zoom in"
      key: "Ctrl-+"
      mac: "Cmd-+"
      requireEditor: "pdfViewer"
  zoomOut:
    path: "./main.ts:zoomOut"
    command:
      name: "PDF: Zoom out"
      key: "Ctrl--"
      mac: "Cmd--"
      requireEditor: "pdfViewer"
  zoomToFitWidth:
    path: "./main.ts:zoomToFitWidth"
    command:
      name: "PDF: Zoom to fit width"
      requireEditor: "pdfViewer"
  zoomToFitHeight:
    path: "./main.ts:zoomToFitHeight"
    command:
      name: "PDF: Zoom to fit height"
      requireEditor: "pdfViewer"
  zoomToFitPage:
    path: "./main.ts:zoomToFitPage"
    command:
      name: "PDF: Zoom to fit page"
      requireEditor: "pdfViewer"